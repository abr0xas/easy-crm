<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <div>
    <label for="id">ID</label>
    <input id="id" formControlName="id" type="text" />
  </div>

  <div>
    <label for="name">Nombre</label>
    <input id="name" formControlName="name" type="text" />
  </div>

  <fieldset formGroupName="contact">
    <legend>Contacto</legend>
    <div>
      <label for="contactName">Nombre</label>
      <input id="contactName" formControlName="name" type="text" />
    </div>
    <div>
      <label for="contactEmail">Email</label>
      <input id="contactEmail" formControlName="email" type="email" />
    </div>
    <div>
      <label for="contactPhone">Teléfono</label>
      <input id="contactPhone" formControlName="phone" type="text" />
    </div>
  </fieldset>

  <fieldset formGroupName="address">
    <legend>Dirección</legend>
    <div>
      <label for="street">Calle</label>
      <input id="street" formControlName="street" type="text" />
    </div>
    <div>
      <label for="city">Ciudad</label>
      <input id="city" formControlName="city" type="text" />
    </div>
    <div>
      <label for="country">País</label>
      <input id="country" formControlName="country" type="text" />
    </div>
    <div>
      <label for="postalCode">Código Postal</label>
      <input id="postalCode" formControlName="postalCode" type="text" />
    </div>
  </fieldset>

  <div>
    <label for="status">Estado</label>
    <select id="status" formControlName="status">
      <option value="active">Activo</option>
      <option value="inactive">Inactivo</option>
      <option value="prospect">Prospecto</option>
    </select>
  </div>

  <div>
    <label for="createdAt">Fecha de creación</label>
    <input id="createdAt" formControlName="createdAt" type="text" readonly />
  </div>

  <div>
    <label for="updatedAt">Fecha de actualización</label>
    <input id="updatedAt" formControlName="updatedAt" type="text" readonly />
  </div>

  <button type="submit">Guardar</button>
</form>
