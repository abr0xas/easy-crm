<form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
  <div>
    <label>ID</label>
    <input formControlName="id" type="text">
  </div>
  <div>
    <label>Nombre</label>
    <input formControlName="name" type="text">
  </div>
  <fieldset formGroupName="contact">
    <legend>Contacto</legend>
    <div>
      <label>Nombre</label>
      <input formControlName="name" type="text">
    </div>
    <div>
      <label>Email</label>
      <input formControlName="email" type="email">
    </div>
    <div>
      <label>Teléfono</label>
      <input formControlName="phone" type="text">
    </div>
  </fieldset>
  <fieldset formGroupName="address">
    <legend>Dirección</legend>
    <div>
      <label>Calle</label>
      <input formControlName="street" type="text">
    </div>
    <div>
      <label>Ciudad</label>
      <input formControlName="city" type="text">
    </div>
   <div>
      <label>País</label>
      <input formControlName="country" type="text">
    </div>
    <div>
      <label>Código Postal</label>
      <input formControlName="postalCode" type="text">
    </div>
  </fieldset>
  <div>
    <label>Estado</label>
    <select formControlName="status">
      <option value="active">Activo</option>
      <option value="inactive">Inactivo</option>
      <option value="prospect">Prospecto</option>
    </select>
  </div>
  <div>
    <label>Fecha de creación</label>
    <input formControlName="createdAt" type="text">
  </div>
  <div>
    <label>Fecha de actualización</label>
    <input formControlName="updatedAt" type="text">
  </div>
  <!-- users se omite por simplicidad, puedes agregar un FormArray si lo necesitas -->
  <button type="submit">Guardar</button>
</form>
